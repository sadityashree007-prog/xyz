<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XYZ | Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
  <div class="hero-shell">
    <header class="hero-header">
      <div class="brand-block">
        <img src="ashoka.jpg" alt="Ashoka Logo" class="brand-logo">
        <div>
          <p class="brand-kicker">Official Learning Platform</p>
          <h1>XYZ</h1>
        </div>
      </div>
      <nav class="hero-nav">
        <a href="index.html">Home</a>
      </nav>
    </header>

    <main class="hero-content">
      <section class="hero-copy">
        <p class="section-label">Smart Practice Hub</p>
        <h2>Explore multiple quizzes with one clean experience.</h2>
        <p class="hero-text">Choose a quiz set below to begin. Each quiz is loaded from its own JSON file and can be renamed easily.</p>
      </section>

      <section class="quiz-grid" id="quizGrid"></section>
    </main>
  </div>

  <script>
    const quizzes = [
      { name: 'Mentorship 2026-27 SET-A', file: 'SET-A.json', link: 'quiz.html?quiz=SET-A.json' },
      { name: 'Mentorship 2026-27 SET-D', file: 'SET-D.json', link: 'quiz.html?quiz=SET-D.json' },
      { name: 'Mentorship 2026-27 SET-C', file: 'SET-C.json', link: 'quiz.html?quiz=SET-C.json' },
      { name: 'Indian Economy National Income (50 MCQs)', file: 'National Income 50 MCQs.json', link: 'quiz.html?quiz=National Income 50 MCQs.json' },
      { name: 'Indian Economy Growth vs Development (50 MCQs)', file: 'growth vs devlopment 50 MCQs.json', link: 'quiz.html?quiz=growth vs devlopment 50 MCQs.json' },
      { name: 'Indian Economy Basic Introduction of Economics (50 MCQs)', file: 'Basic Introduction of economics 50 MCQs.json', link: 'quiz.html?quiz=Basic Introduction of economics 50 MCQs.json' },
      { name: 'Indian Economy Money and Money Supply (50 MCQs)', file: 'Money and Money Supply 50 MCQs.json', link: 'quiz.html?quiz=Money and Money Supply 50 MCQs.json' },
      { name: 'Indian Economy Banking (50 MCQs)', file: 'Banking 50 MCQs.json', link: 'quiz.html?quiz=Banking 50 MCQs.json' },
      { name: 'Indian Economy Monetary Policy (50 MCQs)', file: 'Monetary policy 50 MCQs.json', link: 'quiz.html?quiz=Monetary policy 50 MCQs.json' },
      { name: 'Indian Economy Inflation (50 MCQs)', file: 'Inflation 50 MCQs.json', link: 'quiz.html?quiz=Inflation 50 MCQs.json' },
      { name: 'Indian Economy Tax (50 MCQs)', file: 'Tax 50 MCQs.json', link: 'quiz.html?quiz=Tax 50 MCQs.json' },
      { name: 'Indian Economy India\'s Securities Market (50 MCQs)', file: 'India\'s securities market 50 MCQs.json', link: 'quiz.html?quiz=India\'s securities market 50 MCQs.json' }
      ];

    const grid = document.getElementById('quizGrid');
    grid.innerHTML = quizzes.map(q => `
      <a class="quiz-card" href="${q.link}">
        <h3>${q.name}</h3>
        <p>Quiz file: ${q.file}</p>
        <span>Start Quiz →</span>
      </a>
    `).join('');
  </script>
</body>
</html>
